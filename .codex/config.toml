# Project-scoped Codex configuration.
# Codex reads this file only when the project is trusted.
# Adjust the values to match your team's approvals, sandbox, and model defaults.

project_doc_fallback_filenames = ["TEAM_GUIDE.md", ".agents.md"]
project_doc_max_bytes = 65536

# Keep the default Git-root behavior, but make the intent explicit.
project_root_markers = [".git"]

review_model = "gpt-5.4"
sandbox_mode = "danger-full-access"
approval_policy = "never"
# service_tier = "flex"

[agents]
# Leave enough headroom for product-owner/planner to delegate bounded specialist work
# without encouraging open-ended agent trees.
max_threads = 6
max_depth = 2
job_max_runtime_seconds = 1800

# Example of tightening writable sandbox behavior if you switch to workspace-write.
# [sandbox_workspace_write]
# network_access = false
# writable_roots = []
