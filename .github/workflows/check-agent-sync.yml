name: Check generated surfaces

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Bootstrap CI dependencies
        run: make ci-bootstrap-ubuntu
      - name: Run repo checks
        run: make ci-checks
