name: Check generated surfaces

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
      - name: Verify generated agent files are up to date
        run: make check-agents
      - name: Smoke-test CLI entrypoint
        run: make smoke-cli
      - name: Run Python tests
        run: make test
      - name: Check Pitchfork layout
        run: make check-layout
