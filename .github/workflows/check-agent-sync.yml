name: Check generated surfaces

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify generated agent files are up to date
        run: make check-agents
      - name: Smoke-test CLI entrypoint
        run: make smoke-cli
      - name: Run Python tests
        run: make test
