name: Check agent sync

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  check-agent-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify generated agent files are up to date
        run: python3 scripts/sync_agent_layouts.py --check
